defaultContentLanguage = 'ja'
title = 'ふぁしぶろぐ'
relativeURLs = true
canonifyURLs = false

[params]
  author = 'kouphasi'
  description = 'kouphasiの日々の学びを殴り書きしていくブログです'
  disableSpecial1stPost = true

[module]
  [[module.imports]]
    path = 'github.com/adityatelange/hugo-PaperMod'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
